<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>惊魂寻宝队</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            touch-action: none;
            color: #fff;
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a, #1a0a0a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: #b0a090;
            font-size: 20px;
            transition: opacity 1s;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading .loader {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255,255,255,0.05);
            border-top: 6px solid #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ===== 顶部HUD ===== */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8), transparent);
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            font-size: 14px;
        }
        #hud .left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        #hud .left .title {
            font-size: 18px;
            color: #f0d8b0;
            text-shadow: 0 0 20px rgba(200,150,80,0.15);
        }
        #hud .left .location {
            font-size: 13px;
            opacity: 0.6;
        }
        #hud .right {
            display: flex;
            align-items: center;
            gap: 20px;
            pointer-events: auto;
        }
        #hud .right .value {
            font-size: 20px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.2);
        }
        #hud .right .value span {
            font-size: 14px;
            opacity: 0.6;
            color: #fff;
        }

        /* ===== 上交按钮 ===== */
        #submit-btn {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            padding: 14px 40px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            font-family: 'Comic Sans MS', cursive;
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(245,158,11,0.4);
            transition: all 0.3s ease;
            pointer-events: auto;
        }
        #submit-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        #submit-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== 游戏状态提示 ===== */
        #game-status {
            position: fixed;
            bottom: 170px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            font-size: 14px;
            opacity: 0.7;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        /* ===== 撤离成功遮罩 ===== */
        #win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 0.8s ease;
        }
        #win-overlay.active {
            display: flex;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        #win-overlay .big-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        #win-overlay h2 {
            font-size: 42px;
            color: #ffd700;
            margin-bottom: 10px;
        }
        #win-overlay p {
            font-size: 20px;
            opacity: 0.8;
            margin-bottom: 30px;
        }
        #win-overlay .btn {
            padding: 14px 40px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            color: #fff;
            font-size: 18px;
            font-family: 'Comic Sans MS', cursive;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 30px rgba(139,92,246,0.4);
        }
        #win-overlay .btn:active {
            transform: scale(0.95);
        }

        /* ===== 摇杆和跳跃 (保留) ===== */
        #joystick-area {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.1);
            z-index: 50;
            touch-action: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(168,85,247,0.6), rgba(168,85,247,0.2));
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.2);
            pointer-events: none;
            transition: box-shadow 0.2s;
        }
        #joystick-knob.active {
            box-shadow: 0 0 30px rgba(168,85,247,0.3);
        }

        #jump-btn {
            position: fixed;
            bottom: 50px;
            right: 35px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(236,72,153,0.6), rgba(168,85,247,0.4));
            border: 3px solid rgba(255,255,255,0.15);
            color: white;
            font-size: 32px;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            touch-action: none;
            user-select: none;
            font-family: 'Comic Sans MS', cursive;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        #jump-btn:active {
            transform: scale(0.9);
        }

        #controls-hint {
            position: fixed;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 4px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            z-index: 40;
            pointer-events: none;
            text-align: center;
            font-family: 'Comic Sans MS', cursive;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            #joystick-area { width: 110px; height: 110px; bottom: 20px; left: 15px; }
            #joystick-knob { width: 45px; height: 45px; }
            #jump-btn { width: 60px; height: 60px; bottom: 30px; right: 20px; font-size: 24px; }
            #submit-btn { font-size: 15px; padding: 12px 28px; bottom: 80px; }
            #game-status { bottom: 140px; font-size: 12px; padding: 4px 14px; }
            #hud .left .title { font-size: 15px; }
            #hud .right .value { font-size: 16px; }
            #controls-hint { font-size: 10px; bottom: 130px; }
        }
        @media (max-width: 400px) {
            #joystick-area { width: 90px; height: 90px; }
            #joystick-knob { width: 36px; height: 36px; }
            #jump-btn { width: 50px; height: 50px; font-size: 20px; bottom: 25px; right: 15px; }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="loader"></div>
        <div>🕯️ 正在进入古堡...</div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div class="left">
            <span class="title">🕯️ 惊魂寻宝队</span>
            <span class="location" id="locationLabel">🚐 墨镜车</span>
        </div>
        <div class="right">
            <span class="value" id="valueDisplay">0 <span>万</span></span>
            <span style="opacity:0.4;font-size:13px;" id="treasureCount">宝箱: 0/2</span>
        </div>
    </div>

    <!-- 游戏状态 -->
    <div id="game-status">🔍 探索古堡，寻找宝箱！</div>

    <!-- 上交按钮 -->
    <button id="submit-btn" onclick="submitAll()">📦 上交全部</button>

    <!-- 摇杆 -->
    <div id="joystick-area">
        <div id="joystick-knob"></div>
    </div>
    <div id="jump-btn">⬆</div>
    <div id="controls-hint">🕹️ 移动 · ⬆ 交互</div>

    <!-- 胜利界面 -->
    <div id="win-overlay">
        <div class="big-icon">🚐</div>
        <h2>🎉 成功撤离！</h2>
        <p>你带着 <span id="winValue" style="color:#ffd700;">0</span> 万财富逃出了古堡！</p>
        <button class="btn" onclick="window.location.href='more.html'">⬅ 返回更多玩法</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script>
        // ============================================================
        // 游戏状态
        // ============================================================
        const gameState = {
            value: 0, // 当前财富（万）
            treasureCount: 0, // 已开启宝箱数
            maxTreasures: 2, // 每局2个宝箱
            isInCar: true, // 是否在车里
            isInCastle: false, // 是否在古堡
            isWin: false,
            treasures: [], // 宝箱列表 { type, position, opened, model }
            totalWealth: 0, // 总财富
        };

        const TREASURE_TYPES = {
            WOOD: 'wood',
            GOLD: 'gold'
        };

        // ============================================================
        // 加载完成
        // ============================================================
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 800);
            initGame();
        });

        // ============================================================
        // 场景、相机、渲染器
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.Fog(0x0a0a0a, 30, 60);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ============================================================
        // 灯光（古堡昏暗风格）
        // ============================================================
        const ambientLight = new THREE.AmbientLight(0x442233, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xff8844, 0.3);
        sunLight.position.set(10, 20, 5);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.1;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -20;
        sunLight.shadow.camera.right = 20;
        sunLight.shadow.camera.top = 20;
        sunLight.shadow.camera.bottom = -20;
        scene.add(sunLight);

        const candleLight = new THREE.PointLight(0xff6633, 0.8, 20);
        candleLight.position.set(0, 3, 0);
        scene.add(candleLight);

        const candleLight2 = new THREE.PointLight(0xff4400, 0.5, 15);
        candleLight2.position.set(5, 2, -5);
        scene.add(candleLight2);

        // ============================================================
        // 地面（古堡地板）
        // ============================================================
        const floorMat = new THREE.MeshStandardMaterial({
            color: 0x2a1a10,
            roughness: 0.9,
            metalness: 0.1,
        });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.05;
        floor.receiveShadow = true;
        scene.add(floor);

        // 地板砖纹理线
        const lineMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 });
        for (let i = -20; i <= 20; i += 2) {
            const line1 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.01, 40), lineMat);
            line1.position.set(i, 0.01, 0);
            scene.add(line1);
            const line2 = new THREE.Mesh(new THREE.BoxGeometry(40, 0.01, 0.05), lineMat);
            line2.position.set(0, 0.01, i);
            scene.add(line2);
        }

        // ============================================================
        // 墨镜车（出生点）
        // ============================================================
        function createCar() {
            const group = new THREE.Group();

            // 车身
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.3, metalness: 0.8 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(3, 1.2, 2), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);

            // 车顶
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.4, metalness: 0.6 });
            const roof = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 1.6), roofMat);
            roof.position.set(0, 1.3, 0);
            roof.castShadow = true;
            group.add(roof);

            // 车窗（墨镜效果）
            const glassMat = new THREE.MeshStandardMaterial({
                color: 0x111122,
                roughness: 0.1,
                metalness: 0.9,
                transparent: true,
                opacity: 0.7,
            });
            const glass = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.4, 0.1), glassMat);
            glass.position.set(0, 0.9, 1.01);
            group.add(glass);
            const glass2 = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.4, 0.1), glassMat);
            glass2.position.set(0, 0.9, -1.01);
            group.add(glass2);

            // 车轮
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            const wheelPos = [
                [-1.2, 0.2, 1.1],
                [1.2, 0.2, 1.1],
                [-1.2, 0.2, -1.1],
                [1.2, 0.2, -1.1]
            ];
            wheelPos.forEach(pos => {
                const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.15, 8), wheelMat);
                wheel.rotation.x = Math.PI / 2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                group.add(wheel);
            });

            // 前灯
            const lightMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff4400, emissiveIntensity: 0.3 });
            const headlight = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6), lightMat);
            headlight.position.set(0.8, 0.4, 1.3);
            group.add(headlight);
            const headlight2 = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6), lightMat);
            headlight2.position.set(-0.8, 0.4, 1.3);
            group.add(headlight2);

            // 车门贴纸 "墨镜车"
            const labelMat = new THREE.MeshStandardMaterial({ color: 0x8888aa, emissive: 0x446688, emissiveIntensity: 0.1 });
            const label = new THREE.Mesh(new THREE.PlaneGeometry(1.0, 0.2), labelMat);
            label.position.set(0, 0.6, 1.02);
            group.add(label);

            // 车内光源（暖光）
            const interiorLight = new THREE.PointLight(0xff6633, 0.5, 5);
            interiorLight.position.set(0, 0.8, 0);
            group.add(interiorLight);

            group.position.set(0, 0, -8);
            return group;
        }

        const car = createCar();
        scene.add(car);

        // ============================================================
        // 古堡建筑
        // ============================================================
        function createCastle() {
            const group = new THREE.Group();

            const wallMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 });
            const wallMatDark = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.9 });

            // 主楼
            const main = new THREE.Mesh(new THREE.BoxGeometry(12, 6, 8), wallMat);
            main.position.set(0, 3, 0);
            main.castShadow = true;
            main.receiveShadow = true;
            group.add(main);

            // 塔楼
            const towerMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.8 });
            for (let i = 0; i < 4; i++) {
                const angle = (i / 4) * Math.PI * 2 + Math.PI / 4;
                const tower = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.5, 7, 8), towerMat);
                tower.position.set(Math.cos(angle) * 6.5, 3.5, Math.sin(angle) * 4.5);
                tower.castShadow = true;
                group.add(tower);
                // 塔尖
                const spike = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.5, 6), wallMatDark);
                spike.position.set(Math.cos(angle) * 6.5, 7.5, Math.sin(angle) * 4.5);
                group.add(spike);
            }

            // 门
            const doorMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.9 });
            const door = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 2), doorMat);
            door.position.set(0, 1, 4.01);
            group.add(door);
            // 门把手
            const handleMat = new THREE.MeshStandardMaterial({ color: 0x886644, metalness: 0.8 });
            const handle = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), handleMat);
            handle.position.set(0.4, 1.2, 4.02);
            group.add(handle);

            // 窗户（发光）
            const winMat = new THREE.MeshStandardMaterial({
                color: 0xff8844,
                emissive: 0xff6633,
                emissiveIntensity: 0.2,
                transparent: true,
                opacity: 0.6,
            });
            const winPos = [
                [-2, 3, 4.01],
                [2, 3, 4.01],
                [-1, 4.5, 4.01],
                [1, 4.5, 4.01],
                [-3, 2, -4.01],
                [3, 2, -4.01],
                [-4, 3, -4.01],
                [4, 3, -4.01],
            ];
            winPos.forEach(pos => {
                const win = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.8), winMat);
                win.position.set(pos[0], pos[1], pos[2]);
                if (pos[2] < 0) win.rotation.y = Math.PI;
                group.add(win);
            });

            // 走廊（从门延伸）
            const corridorMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 });
            for (let i = 0; i < 3; i++) {
                const corridor = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3, 2), corridorMat);
                corridor.position.set(0, 1.5, 6 + i * 2);
                corridor.castShadow = true;
                group.add(corridor);
                // 走廊灯光
                const light = new THREE.PointLight(0xff6633, 0.3, 4);
                light.position.set(0, 2.5, 6 + i * 2);
                group.add(light);
            }

            // 房间（两侧）
            const roomMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.8 });
            const roomPos = [
                [-3, 1.5, 7],
                [3, 1.5, 7],
                [-3, 1.5, 9],
                [3, 1.5, 9],
            ];
            roomPos.forEach(pos => {
                const room = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 2.5), roomMat);
                room.position.set(pos[0], pos[1], pos[2]);
                room.castShadow = true;
                group.add(room);
                // 房间门
                const doorSmall = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 1.2), doorMat);
                doorSmall.position.set(pos[0] > 0 ? pos[0] - 1.26 : pos[0] + 1.26, 1, pos[2]);
                if (pos[0] > 0) doorSmall.rotation.y = -Math.PI / 2;
                else doorSmall.rotation.y = Math.PI / 2;
                group.add(doorSmall);
            });

            group.position.set(0, 0, 0);
            return group;
        }

        const castle = createCastle();
        scene.add(castle);

        // ============================================================
        // 宝箱
        // ============================================================
        function createTreasureBox(type, x, z) {
            const group = new THREE.Group();
            let color, name, value, icon;

            if (type === TREASURE_TYPES.WOOD) {
                color = 0x8B6B4D;
                name = '木头宝箱';
                value = 25;
                icon = '📦';
            } else {
                color = 0xFFD700;
                name = '金色宝箱';
                value = 50;
                icon = '👑';
            }

            const boxMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6, metalness: type === TREASURE_TYPES
                    .GOLD ? 0.8 : 0.1 });
            const box = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 0.8), boxMat);
            box.position.y = 0.3;
            box.castShadow = true;
            group.add(box);

            // 盖子
            const lidMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6, metalness: type === TREASURE_TYPES
                    .GOLD ? 0.8 : 0.1 });
            const lid = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.1, 0.85), lidMat);
            lid.position.y = 0.65;
            lid.rotation.x = 0.1;
            group.add(lid);

            // 锁扣
            const lockMat = new THREE.MeshStandardMaterial({ color: 0x886644, metalness: 0.8 });
            const lock = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.1, 0.05), lockMat);
            lock.position.set(0, 0.6, 0.4);
            group.add(lock);

            // 发光效果
            const glowMat = new THREE.MeshStandardMaterial({
                color: type === TREASURE_TYPES.GOLD ? 0xffd700 : 0x8B6B4D,
                emissive: type === TREASURE_TYPES.GOLD ? 0xffd700 : 0x8B6B4D,
                emissiveIntensity: 0.1,
                transparent: true,
                opacity: 0.15,
            });
            const glow = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), glowMat);
            glow.position.y = 0.3;
            group.add(glow);

            // 标签（漂浮文字）
            const labelMat = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                emissive: 0xffffff,
                emissiveIntensity: 0.1,
            });
            // 用平面模拟标签（实际在2D UI里显示）

            group.position.set(x, 0, z);
            group.userData = {
                type: type,
                name: name,
                value: value,
                icon: icon,
                opened: false,
                model: group,
            };
            return group;
        }

        // 放置宝箱（在古堡内随机位置）
        function placeTreasures() {
            const positions = [
                [-2.5, 7],
                [2.5, 7],
                [-2.5, 9],
                [2.5, 9],
                [-1, 7.5],
                [1, 7.5],
                [-3, 5],
                [3, 5],
                [0, 10],
                [-3, 10],
                [3, 10],
            ];
            const shuffled = positions.sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, 2);

            selected.forEach((pos, index) => {
                const type = index === 0 ? TREASURE_TYPES.WOOD : TREASURE_TYPES.GOLD;
                const treasure = createTreasureBox(type, pos[0], pos[1]);
                scene.add(treasure);
                gameState.treasures.push({
                    mesh: treasure,
                    type: type,
                    position: { x: pos[0], z: pos[1] },
                    opened: false,
                    value: type === TREASURE_TYPES.WOOD ? 25 : 50,
                });
            });

            updateTreasureCount();
        }

        // ============================================================
        // 凤凰蛋（精细建模）
        // ============================================================
        function createPhoenixEgg(x, y, z) {
            const group = new THREE.Group();

            // 蛋体（发光渐变）
            const eggMat = new THREE.MeshStandardMaterial({
                color: 0xff6633,
                emissive: 0xff4400,
                emissiveIntensity: 0.3,
                roughness: 0.2,
                metalness: 0.5,
            });
            const egg = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), eggMat);
            egg.scale.set(0.9, 1.2, 0.9);
            egg.position.y = 0.35;
            egg.castShadow = true;
            group.add(egg);

            // 金色纹路
            const lineMat = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                emissive: 0xff8800,
                emissiveIntensity: 0.2,
            });
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const line = new THREE.Mesh(new THREE.TorusGeometry(0.25, 0.015, 4, 8), lineMat);
                line.position.set(0, 0.35, 0);
                line.rotation.x = Math.PI / 2;
                line.rotation.z = angle;
                group.add(line);
            }

            // 顶部火焰
            const flameMat = new THREE.MeshStandardMaterial({
                color: 0xff4400,
                emissive: 0xff2200,
                emissiveIntensity: 0.5,
                transparent: true,
                opacity: 0.7,
            });
            const flame = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.3, 6), flameMat);
            flame.position.y = 0.7;
            group.add(flame);

            // 光晕
            const glowMat = new THREE.MeshStandardMaterial({
                color: 0xff4400,
                emissive: 0xff4400,
                emissiveIntensity: 0.2,
                transparent: true,
                opacity: 0.15,
            });
            const glow = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), glowMat);
            glow.position.y = 0.35;
            group.add(glow);

            group.position.set(x, y, z);
            return group;
        }

        // ============================================================
        // 王权之心（精细建模）
        // ============================================================
        function createCrownHeart(x, y, z) {
            const group = new THREE.Group();

            // 心形主体
            const heartMat = new THREE.MeshStandardMaterial({
                color: 0xff0044,
                emissive: 0xcc0033,
                emissiveIntensity: 0.3,
                roughness: 0.2,
                metalness: 0.8,
            });
            const heart = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 12), heartMat);
            heart.scale.set(1, 1.2, 0.8);
            heart.position.y = 0.3;
            heart.castShadow = true;
            group.add(heart);

            // 心形第二瓣
            const heart2 = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 12), heartMat);
            heart2.scale.set(1, 1.2, 0.8);
            heart2.position.set(0.25, 0.45, 0);
            group.add(heart2);
            const heart3 = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 12), heartMat);
            heart3.scale.set(1, 1.2, 0.8);
            heart3.position.set(-0.25, 0.45, 0);
            group.add(heart3);

            // 皇冠
            const crownMat = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                emissive: 0xff8800,
                emissiveIntensity: 0.1,
                metalness: 0.9,
                roughness: 0.2,
            });
            const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.45, 0.15, 8), crownMat);
            crown.position.y = 0.75;
            group.add(crown);

            // 皇冠尖
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2;
                const spike = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.15, 4), crownMat);
                spike.position.set(Math.cos(angle) * 0.38, 0.85, Math.sin(angle) * 0.38);
                spike.rotation.z = Math.cos(angle) * 0.2;
                spike.rotation.x = Math.sin(angle) * 0.2;
                group.add(spike);
            }

            // 宝石
            const gemMat = new THREE.MeshStandardMaterial({
                color: 0xff0044,
                emissive: 0xff0044,
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.8,
                metalness: 0.1,
            });
            const gem = new THREE.Mesh(new THREE.OctahedronGeometry(0.08), gemMat);
            gem.position.set(0, 0.8, 0.25);
            group.add(gem);

            // 光晕
            const glowMat = new THREE.MeshStandardMaterial({
                color: 0xff0044,
                emissive: 0xff0044,
                emissiveIntensity: 0.2,
                transparent: true,
                opacity: 0.1,
            });
            const glow = new THREE.Mesh(new THREE.SphereGeometry(0.6, 8, 8), glowMat);
            glow.position.y = 0.4;
            group.add(glow);

            group.position.set(x, y, z);
            return group;
        }

        // ============================================================
        // 玩家（蛋仔角色）
        // ============================================================
        function createPlayer() {
            const group = new THREE.Group();

            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xFFD54F, roughness: 0.3 });
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.5, 12, 12), bodyMat);
            body.scale.set(1, 0.85, 1);
            body.position.y = 0.5;
            body.castShadow = true;
            group.add(body);

            const bellyMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.5 });
            const belly = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), bellyMat);
            belly.scale.set(0.9, 0.8, 0.5);
            belly.position.set(0, 0.4, 0.5);
            group.add(belly);

            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e });
            const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF });
            for (let s = -1; s <= 1; s += 2) {
                const white = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6), eyeWhiteMat);
                white.position.set(s * 0.2, 0.65, 0.55);
                group.add(white);
                const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), eyeMat);
                pupil.position.set(s * 0.2 + s * 0.05, 0.65, 0.65);
                group.add(pupil);
            }

            const hatMat = new THREE.MeshStandardMaterial({ color: 0x8B5CF6, roughness: 0.3 });
            const hat = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.4, 6), hatMat);
            hat.position.y = 0.9;
            group.add(hat);
            const hatBand = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.04, 4, 8),
                new THREE.MeshStandardMaterial({ color: 0xEC4899 }));
            hatBand.position.y = 0.75;
            group.add(hatBand);

            group.position.set(0, 0, 0);
            return group;
        }

        const player = createPlayer();
        scene.add(player);

        // ============================================================
        // 玩家控制
        // ============================================================
        const playerSpeed = 4.5;
        const jumpSpeed = 5.0;
        let velocityY = 0;
        let isOnGround = true;
        let isJumping = false;

        // 摇杆
        const joystickArea = document.getElementById('joystick-area');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickData = { x: 0, y: 0 };
        let joystickTouchId = null;
        const SENSITIVITY = 0.6;

        function handleJoystickStart(clientX, clientY) {
            const rect = joystickArea.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const radius = rect.width / 2;
            let dx = clientX - centerX;
            let dy = clientY - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const maxDist = radius - 30;
            if (dist > maxDist) { dx = dx / dist * maxDist;
                dy = dy / dist * maxDist; }
            joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            joystickKnob.classList.add('active');
            const normalizedX = (dx / maxDist) * SENSITIVITY;
            const normalizedY = (dy / maxDist) * SENSITIVITY;
            joystickData.x = Math.max(-1, Math.min(1, normalizedX));
            joystickData.y = Math.max(-1, Math.min(1, normalizedY));
            joystickActive = true;
        }

        function handleJoystickMove(clientX, clientY) {
            if (!joystickActive) return;
            const rect = joystickArea.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const radius = rect.width / 2;
            let dx = clientX - centerX;
            let dy = clientY - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const maxDist = radius - 30;
            if (dist > maxDist) { dx = dx / dist * maxDist;
                dy = dy / dist * maxDist; }
            joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            const normalizedX = (dx / maxDist) * SENSITIVITY;
            const normalizedY = (dy / maxDist) * SENSITIVITY;
            joystickData.x = Math.max(-1, Math.min(1, normalizedX));
            joystickData.y = Math.max(-1, Math.min(1, normalizedY));
        }

        function handleJoystickEnd() {
            joystickKnob.style.transform = 'translate(-50%, -50%)';
            joystickKnob.classList.remove('active');
            joystickActive = false;
            joystickData.x = 0;
            joystickData.y = 0;
            joystickTouchId = null;
        }

        joystickArea.addEventListener('mousedown', (e) => { e.preventDefault();
            handleJoystickStart(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => { if (joystickActive) handleJoystickMove(e.clientX, e.clientY); });
        window.addEventListener('mouseup', () => { if (joystickActive) handleJoystickEnd(); });
        joystickArea.addEventListener('touchstart', (e) => { e.preventDefault(); const touch = e.changedTouches[0];
            joystickTouchId = touch.identifier;
            handleJoystickStart(touch.clientX, touch.clientY); }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (joystickTouchId !== null) {
                const touch = Array.from(e.changedTouches).find(t => t.identifier === joystickTouchId);
                if (touch) { e.preventDefault();
                    handleJoystickMove(touch.clientX, touch.clientY); }
            }
        }, { passive: false });
        window.addEventListener('touchend', (e) => {
            const touch = Array.from(e.changedTouches).find(t => t.identifier === joystickTouchId);
            if (touch) { e.preventDefault();
                handleJoystickEnd(); }
        }, { passive: false });
        window.addEventListener('touchcancel', () => { if (joystickTouchId !== null) handleJoystickEnd(); });

        // 跳跃
        const jumpBtn = document.getElementById('jump-btn');

        function doJump() {
            if (isOnGround && !isJumping) {
                velocityY = jumpSpeed;
                isOnGround = false;
                isJumping = true;
                // 检测是否在宝箱附近
                checkNearTreasure();
            }
        }
        jumpBtn.addEventListener('mousedown', (e) => { e.preventDefault();
            doJump(); });
        jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault();
            doJump(); }, { passive: false });

        // ============================================================
        // 宝箱交互
        // ============================================================
        function checkNearTreasure() {
            const playerPos = player.position;
            let found = false;
            for (let t of gameState.treasures) {
                if (t.opened) continue;
                const dx = playerPos.x - t.position.x;
                const dz = playerPos.z - t.position.z;
                if (dx * dx + dz * dz < 4) {
                    openTreasure(t);
                    found = true;
                    break;
                }
            }
            if (!found) {
                // 如果不在宝箱附近，尝试切换到古堡/车辆
                toggleLocation();
            }
        }

        function openTreasure(treasure) {
            if (treasure.opened) return;
            treasure.opened = true;
            gameState.treasureCount++;
            updateTreasureCount();

            // 从场景移除宝箱模型
            scene.remove(treasure.mesh);

            // 生成对应的宝物模型
            const pos = treasure.position;
            let model;
            if (treasure.type === TREASURE_TYPES.WOOD) {
                model = createPhoenixEgg(pos.x, 0.5, pos.z);
                gameState.value += 25;
                document.getElementById('game-status').textContent = '🔥 获得凤凰蛋！价值 25 万！';
            } else {
                model = createCrownHeart(pos.x, 0.5, pos.z);
                gameState.value += 50;
                document.getElementById('game-status').textContent = '👑 获得王权之心！价值 50 万！';
            }
            scene.add(model);

            // 更新显示
            updateValueDisplay();

            // 检查是否集齐所有宝箱
            if (gameState.treasureCount >= gameState.maxTreasures) {
                document.getElementById('game-status').textContent = '🎉 所有宝箱已开启！点击"上交全部"撤离！';
                document.getElementById('submit-btn').disabled = false;
            }

            // 震动反馈（如果有）
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function toggleLocation() {
            if (gameState.isInCar) {
                gameState.isInCar = false;
                gameState.isInCastle = true;
                document.getElementById('locationLabel').textContent = '🏰 温斯洛古堡';
                document.getElementById('game-status').textContent = '🔍 探索古堡，寻找宝箱！';
                // 移动玩家到古堡门口
                player.position.set(0, 0, 4);
                document.getElementById('controls-hint').textContent = '🕹️ 探索古堡 · 靠近宝箱跳跃开启';
            } else if (gameState.isInCastle) {
                gameState.isInCastle = false;
                gameState.isInCar = true;
                document.getElementById('locationLabel').textContent = '🚐 墨镜车';
                document.getElementById('game-status').textContent = '🔙 已返回墨镜车';
                player.position.set(0, 0, -8);
            }
        }

        // ============================================================
        // 上交全部
        // ============================================================
        function submitAll() {
            if (gameState.value >= 100) {
                // 胜利！
                gameState.isWin = true;
                document.getElementById('winValue').textContent = gameState.value;
                document.getElementById('win-overlay').classList.add('active');
                document.getElementById('submit-btn').disabled = true;
                document.getElementById('game-status').textContent = '🚐 成功撤离！';
            } else {
                document.getElementById('game-status').textContent = '💰 当前价值 ' + gameState.value + ' 万，需要 100 万才能撤离！';
                document.getElementById('game-status').style.color = '#ff6b6b';
                setTimeout(() => {
                    document.getElementById('game-status').style.color = '';
                }, 1500);
            }
        }

        // ============================================================
        // UI更新
        // ============================================================
        function updateValueDisplay() {
            document.getElementById('valueDisplay').innerHTML = gameState.value + ' <span>万</span>';
        }

        function updateTreasureCount() {
            document.getElementById('treasureCount').textContent = '宝箱: ' + gameState.treasureCount + '/' + gameState
                .maxTreasures;
        }

        // ============================================================
        // 窗口自适应
        // ============================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================================
        // 相机跟随
        // ============================================================
        const camDistance = 8;
        const camHeight = 5;

        function updateCamera() {
            const playerPos = player.position.clone();
            playerPos.y += 1.2;
            const angle = player.rotation.y || 0;
            const offsetX = Math.sin(angle) * camDistance;
            const offsetZ = Math.cos(angle) * camDistance;
            camera.position.x = playerPos.x - offsetX;
            camera.position.z = playerPos.z - offsetZ;
            camera.position.y = playerPos.y + camHeight;
            camera.lookAt(playerPos);
        }

        // ============================================================
        // 初始化游戏
        // ============================================================
        function initGame() {
            // 玩家出生在车里
            player.position.set(0, 0, -8);
            document.getElementById('locationLabel').textContent = '🚐 墨镜车';
            document.getElementById('submit-btn').disabled = true;
            gameState.isInCar = true;

            // 放置宝箱
            placeTreasures();

            // 更新UI
            updateValueDisplay();
            updateTreasureCount();

            // 自动进入古堡提示
            setTimeout(() => {
                document.getElementById('game-status').textContent = '🚶 向前走进入古堡...';
            }, 1500);
        }

        // ============================================================
        // 动画循环
        // ============================================================
        let time = 0;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.05);
            time += delta;

            // ---- 玩家移动 ----
            const moveX = joystickData.x;
            const moveZ = joystickData.y;

            const forward = new THREE.Vector3(0, 0, -1);
            const right = new THREE.Vector3(1, 0, 0);
            const camQuat = camera.quaternion.clone();
            camQuat.x = 0;
            camQuat.z = 0;
            camQuat.normalize();

            const moveDir = new THREE.Vector3();
            moveDir.add(forward.clone().applyQuaternion(camQuat).multiplyScalar(-moveZ));
            moveDir.add(right.clone().applyQuaternion(camQuat).multiplyScalar(moveX));
            moveDir.y = 0;

            const moveLen = moveDir.length();
            if (moveLen > 0.01) {
                moveDir.normalize();
                const targetAngle = Math.atan2(moveDir.x, moveDir.z);
                let currentAngle = player.rotation.y;
                let diff = targetAngle - currentAngle;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                const turnSpeed = 5.0;
                player.rotation.y += diff * Math.min(1, turnSpeed * delta);
            }

            const moveSpeed = playerSpeed * Math.min(1, moveLen);
            const step = moveSpeed * delta;
            const moveVec = moveDir.clone().multiplyScalar(step);

            const newPos = player.position.clone().add(moveVec);
            if (Math.abs(newPos.x) < 15 && Math.abs(newPos.z) < 15) {
                player.position.x += moveVec.x;
                player.position.z += moveVec.z;
            }

            // 自动进出古堡（通过z轴位置判断）
            if (player.position.z > 3 && player.position.z < 5 && !gameState.isInCastle && !gameState.isInCar) {
                gameState.isInCastle = true;
                gameState.isInCar = false;
                document.getElementById('locationLabel').textContent = '🏰 温斯洛古堡';
                document.getElementById('game-status').textContent = '🔍 探索古堡，寻找宝箱！';
            }
            if (player.position.z < -5 && !gameState.isInCar && !gameState.isInCastle) {
                gameState.isInCar = true;
                gameState.isInCastle = false;
                document.getElementById('locationLabel').textContent = '🚐 墨镜车';
                document.getElementById('game-status').textContent = '🔙 已返回墨镜车';
            }

            // ---- 跳跃物理 ----
            if (!isOnGround) {
                velocityY -= 12 * delta;
                player.position.y += velocityY * delta;
                if (player.position.y <= 0) {
                    player.position.y = 0;
                    velocityY = 0;
                    isOnGround = true;
                    isJumping = false;
                }
            }

            // 呼吸动画
            const breathe = Math.sin(time * 2) * 0.005;
            player.position.y += breathe;

            // ---- 宝箱旋转动画 ----
            gameState.treasures.forEach(t => {
                if (!t.opened && t.mesh) {
                    t.mesh.rotation.y += delta * 0.8;
                    t.mesh.position.y = 0 + Math.sin(time * 2 + t.position.x) * 0.05;
                }
            });

            // ---- 蜡烛光闪烁 ----
            candleLight.intensity = 0.6 + Math.sin(time * 3) * 0.2;
            candleLight2.intensity = 0.4 + Math.sin(time * 2.5 + 1) * 0.15;

            // ---- 凤凰蛋特效 ----
            scene.children.forEach(child => {
                if (child.isMesh && child.material && child.material.emissiveIntensity !== undefined) {
                    if (child.material.color.getHex() === 0xff6633 || child.material.color.getHex() === 0xff0044) {
                        child.material.emissiveIntensity = 0.2 + Math.sin(time * 2 + child.position.x) * 0.15;
                    }
                }
            });

            // ---- 更新相机 ----
            updateCamera();

            renderer.render(scene, camera);
        }

        // 初始化相机
        updateCamera();
        animate();

        console.log('🕯️ 惊魂寻宝队已加载！');
        console.log('📦 找到2个宝箱，集齐100万撤离！');
        console.log('🚐 出生在墨镜车，走向古堡探索！');
    </script>
</body>
</html>
