<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>惊魂寻宝队</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            touch-action: none;
            color: #fff;
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a, #1a0a0a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: #b0a090;
            font-size: 20px;
            transition: opacity 1s;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading .loader {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255,255,255,0.05);
            border-top: 6px solid #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8), transparent);
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            font-size: 14px;
        }
        #hud .left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        #hud .left .title {
            font-size: 18px;
            color: #f0d8b0;
            text-shadow: 0 0 20px rgba(200,150,80,0.15);
        }
        #hud .left .location {
            font-size: 13px;
            opacity: 0.6;
        }
        #hud .right {
            display: flex;
            align-items: center;
            gap: 20px;
            pointer-events: auto;
        }
        #hud .right .value {
            font-size: 20px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.2);
        }
        #hud .right .value span {
            font-size: 14px;
            opacity: 0.6;
            color: #fff;
        }

        /* 进入古堡按钮 */
        #enter-btn {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            padding: 14px 40px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #8B5CF6, #6d28d9);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            font-family: 'Comic Sans MS', cursive;
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(139,92,246,0.4);
            transition: all 0.3s ease;
            pointer-events: auto;
        }
        #enter-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        #enter-btn.hidden {
            display: none;
        }

        /* 上交按钮 */
        #submit-btn {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            padding: 14px 40px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            font-family: 'Comic Sans MS', cursive;
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(245,158,11,0.4);
            transition: all 0.3s ease;
            pointer-events: auto;
        }
        #submit-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        #submit-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #game-status {
            position: fixed;
            bottom: 240px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            font-size: 14px;
            opacity: 0.7;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            max-width: 90%;
        }

        #win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 0.8s ease;
        }
        #win-overlay.active {
            display: flex;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        #win-overlay .big-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        #win-overlay h2 {
            font-size: 42px;
            color: #ffd700;
            margin-bottom: 10px;
        }
        #win-overlay p {
            font-size: 20px;
            opacity: 0.8;
            margin-bottom: 30px;
        }
        #win-overlay .btn {
            padding: 14px 40px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            color: #fff;
            font-size: 18px;
            font-family: 'Comic Sans MS', cursive;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 30px rgba(139,92,246,0.4);
        }
        #win-overlay .btn:active {
            transform: scale(0.95);
        }

        #joystick-area {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.1);
            z-index: 50;
            touch-action: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(168,85,247,0.6), rgba(168,85,247,0.2));
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.2);
            pointer-events: none;
            transition: box-shadow 0.2s;
        }
        #joystick-knob.active {
            box-shadow: 0 0 30px rgba(168,85,247,0.3);
        }

        #jump-btn {
            position: fixed;
            bottom: 50px;
            right: 35px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(236,72,153,0.6), rgba(168,85,247,0.4));
            border: 3px solid rgba(255,255,255,0.15);
            color: white;
            font-size: 32px;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            touch-action: none;
            user-select: none;
            font-family: 'Comic Sans MS', cursive;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        #jump-btn:active {
            transform: scale(0.9);
        }

        #controls-hint {
            position: fixed;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 4px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            z-index: 40;
            pointer-events: none;
            text-align: center;
            font-family: 'Comic Sans MS', cursive;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            #joystick-area { width: 110px; height: 110px; bottom: 20px; left: 15px; }
            #joystick-knob { width: 45px; height: 45px; }
            #jump-btn { width: 60px; height: 60px; bottom: 30px; right: 20px; font-size: 24px; }
            #submit-btn { font-size: 15px; padding: 12px 28px; bottom: 80px; }
            #enter-btn { font-size: 15px; padding: 12px 28px; bottom: 140px; }
            #game-status { bottom: 200px; font-size: 12px; padding: 4px 14px; }
            #hud .left .title { font-size: 15px; }
            #hud .right .value { font-size: 16px; }
            #controls-hint { font-size: 10px; bottom: 130px; }
        }
        @media (max-width: 400px) {
            #joystick-area { width: 90px; height: 90px; }
            #joystick-knob { width: 36px; height: 36px; }
            #jump-btn { width: 50px; height: 50px; font-size: 20px; bottom: 25px; right: 15px; }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="loader"></div>
        <div>🕯️ 正在进入古堡...</div>
    </div>

    <div id="hud">
        <div class="left">
            <span class="title">🕯️ 惊魂寻宝队</span>
            <span class="location" id="locationLabel">🚐 摸金车</span>
        </div>
        <div class="right">
            <span class="value" id="valueDisplay">0 <span>万</span></span>
            <span style="opacity:0.4;font-size:13px;" id="treasureCount">宝箱: 0/2</span>
        </div>
    </div>

    <div id="game-status">🔍 点击「进入古堡」开始探险！</div>

    <button id="enter-btn" onclick="enterCastle()">🏰 进入古堡</button>
    <button id="submit-btn" onclick="submitAll()" disabled>📦 上交全部</button>

    <div id="joystick-area">
        <div id="joystick-knob"></div>
    </div>
    <div id="jump-btn">⬆</div>
    <div id="controls-hint">🕹️ 移动 · ⬆ 开启宝箱</div>

    <div id="win-overlay">
        <div class="big-icon">🚐</div>
        <h2>🎉 成功撤离！</h2>
        <p>你带着 <span id="winValue" style="color:#ffd700;">0</span> 万财富逃出了古堡！</p>
        <button class="btn" onclick="window.location.href='more.html'">⬅ 返回更多玩法</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script>
        // ============================================================
        // 游戏状态
        // ============================================================
        const gameState = {
            value: 0,
            treasureCount: 0,
            maxTreasures: 2,
            isInCar: true,
            isInCastle: false,
            isWin: false,
            treasures: [],
        };

        const TREASURE_TYPES = {
            WOOD: 'wood',
            GOLD: 'gold'
        };

        // ============================================================
        // 加载完成
        // ============================================================
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 800);
            initGame();
        });

        // ============================================================
        // 场景、相机、渲染器
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 50, 90);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 14);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        document.body.appendChild(renderer.domElement);

        // ============================================================
        // 灯光
        // ============================================================
        const ambientLight = new THREE.AmbientLight(0x8866aa, 0.8);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        sunLight.position.set(20, 30, 20);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.1;
        sunLight.shadow.camera.far = 80;
        sunLight.shadow.camera.left = -40;
        sunLight.shadow.camera.right = 40;
        sunLight.shadow.camera.top = 40;
        sunLight.shadow.camera.bottom = -40;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0x8888ff, 0.6);
        fillLight.position.set(-20, 20, -20);
        scene.add(fillLight);

        const candleLight = new THREE.PointLight(0xff8844, 2.0, 40);
        candleLight.position.set(0, 6, 0);
        scene.add(candleLight);

        const candleLight2 = new THREE.PointLight(0xff8844, 1.5, 35);
        candleLight2.position.set(10, 5, -10);
        scene.add(candleLight2);

        const candleLight3 = new THREE.PointLight(0xff8844, 1.5, 35);
        candleLight3.position.set(-10, 5, -10);
        scene.add(candleLight3);

        const candleLight4 = new THREE.PointLight(0xff8844, 1.5, 35);
        candleLight4.position.set(0, 5, 16);
        scene.add(candleLight4);

        const hemiLight = new THREE.HemisphereLight(0xffeedd, 0x442233, 1.0);
        scene.add(hemiLight);

        // ============================================================
        // 地面
        // ============================================================
        const floorMat = new THREE.MeshStandardMaterial({
            color: 0x3a2a1a,
            roughness: 0.8,
            metalness: 0.1,
        });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.05;
        floor.receiveShadow = true;
        scene.add(floor);

        const lineMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.8 });
        for (let i = -30; i <= 30; i += 2.5) {
            const line1 = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.01, 60), lineMat);
            line1.position.set(i, 0.01, 0);
            scene.add(line1);
            const line2 = new THREE.Mesh(new THREE.BoxGeometry(60, 0.01, 0.05), lineMat);
            line2.position.set(0, 0.01, i);
            scene.add(line2);
        }

        // ============================================================
        // 碰撞箱系统
        // ============================================================
        const obstacles = [];

        function addObstacle(x, z, radius) {
            obstacles.push({ x: x, z: z, radius: radius });
        }

        function checkCollision(newX, newZ, playerRadius) {
            for (let obs of obstacles) {
                const dx = newX - obs.x;
                const dz = newZ - obs.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < playerRadius + obs.radius) {
                    return true;
                }
            }
            // 边界限制
            if (Math.abs(newX) > 28 || Math.abs(newZ) > 28) return true;
            return false;
        }

        // ============================================================
        // 摸金车
        // ============================================================
        function createCar() {
            const group = new THREE.Group();

            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.3, metalness: 0.8 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.4, 2.2), bodyMat);
            body.position.y = 0.7;
            body.castShadow = true;
            group.add(body);

            const roofMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.4, metalness: 0.6 });
            const roof = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.7, 1.8), roofMat);
            roof.position.set(0, 1.5, 0);
            roof.castShadow = true;
            group.add(roof);

            const glassMat = new THREE.MeshStandardMaterial({
                color: 0x111122,
                roughness: 0.1,
                metalness: 0.9,
                transparent: true,
                opacity: 0.7,
            });
            const glass = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.5, 0.1), glassMat);
            glass.position.set(0, 1.0, 1.11);
            group.add(glass);
            const glass2 = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.5, 0.1), glassMat);
            glass2.position.set(0, 1.0, -1.11);
            group.add(glass2);

            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            const wheelPos = [
                [-1.4, 0.2, 1.2],
                [1.4, 0.2, 1.2],
                [-1.4, 0.2, -1.2],
                [1.4, 0.2, -1.2]
            ];
            wheelPos.forEach(pos => {
                const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.15, 8), wheelMat);
                wheel.rotation.x = Math.PI / 2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                group.add(wheel);
            });

            const lightMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff4400, emissiveIntensity: 0.5 });
            const headlight = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 6), lightMat);
            headlight.position.set(0.9, 0.5, 1.4);
            group.add(headlight);
            const headlight2 = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 6), lightMat);
            headlight2.position.set(-0.9, 0.5, 1.4);
            group.add(headlight2);

            const labelMat = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                emissive: 0xff8800,
                emissiveIntensity: 0.2,
            });
            const label = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 0.3), labelMat);
            label.position.set(0, 0.7, 1.12);
            group.add(label);

            const interiorLight = new THREE.PointLight(0xff6633, 0.8, 5);
            interiorLight.position.set(0, 0.8, 0);
            group.add(interiorLight);

            group.position.set(0, 0, -12);
            return group;
        }

        const car = createCar();
        scene.add(car);
        addObstacle(0, -12, 2.5);

        // ============================================================
        // 古堡（放大版）
        // ============================================================
        function createCastle() {
            const group = new THREE.Group();

            const wallMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.8 });
            const wallMatDark = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.8 });

            // 主楼（放大）
            const main = new THREE.Mesh(new THREE.BoxGeometry(20, 8, 14), wallMat);
            main.position.set(0, 4, 0);
            main.castShadow = true;
            main.receiveShadow = true;
            group.add(main);
            addObstacle(0, 0, 12);
            addObstacle(0, 0, 10);

            // 塔楼（放大）
            const towerMat = new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.7 });
            const towerPositions = [
                [-9, -6],
                [9, -6],
                [-9, 6],
                [9, 6]
            ];
            towerPositions.forEach(pos => {
                const tower = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 2.2, 9, 8), towerMat);
                tower.position.set(pos[0], 4.5, pos[1]);
                tower.castShadow = true;
                group.add(tower);
                addObstacle(pos[0], pos[1], 2.2);
                const spike = new THREE.Mesh(new THREE.ConeGeometry(0.8, 2, 6), wallMatDark);
                spike.position.set(pos[0], 9.5, pos[1]);
                group.add(spike);
            });

            // 大门（放大）
            const doorMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 });
            const door = new THREE.Mesh(new THREE.PlaneGeometry(2, 3), doorMat);
            door.position.set(0, 1.5, 7.01);
            group.add(door);
            const handleMat = new THREE.MeshStandardMaterial({ color: 0x886644, metalness: 0.8 });
            const handle = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), handleMat);
            handle.position.set(0.6, 1.8, 7.02);
            group.add(handle);

            // 窗户（发光，放大）
            const winMat = new THREE.MeshStandardMaterial({
                color: 0xff8844,
                emissive: 0xff6633,
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.7,
            });
            const winPos = [
                [-3, 4, 7.01],
                [3, 4, 7.01],
                [-1.5, 6, 7.01],
                [1.5, 6, 7.01],
                [-4, 3, -7.01],
                [4, 3, -7.01],
                [-5, 4.5, -7.01],
                [5, 4.5, -7.01],
                [-7, 3, -3],
                [7, 3, -3],
                [-7, 4.5, 3],
                [7, 4.5, 3],
            ];
            winPos.forEach(pos => {
                const win = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), winMat);
                win.position.set(pos[0], pos[1], pos[2]);
                if (pos[2] < 0) win.rotation.y = Math.PI;
                group.add(win);
            });

            // 走廊（放大）
            const corridorMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.8 });
            for (let i = 0; i < 4; i++) {
                const corridor = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 3), corridorMat);
                corridor.position.set(0, 2, 10 + i * 3);
                corridor.castShadow = true;
                group.add(corridor);
                addObstacle(0, 10 + i * 3, 2.5);
                const light = new THREE.PointLight(0xff6633, 0.5, 5);
                light.position.set(0, 3, 10 + i * 3);
                group.add(light);
            }

            // 房间（放大）
            const roomMat = new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.7 });
            const roomPos = [
                [-5, 2, 11],
                [5, 2, 11],
                [-5, 2, 14],
                [5, 2, 14],
                [-5, 2, 17],
                [5, 2, 17],
            ];
            roomPos.forEach(pos => {
                const room = new THREE.Mesh(new THREE.BoxGeometry(4, 3.5, 3.5), roomMat);
                room.position.set(pos[0], pos[1], pos[2]);
                room.castShadow = true;
                group.add(room);
                addObstacle(pos[0], pos[2], 2.5);
                // 房间门
                const doorSmall = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 1.8), doorMat);
                doorSmall.position.set(pos[0] > 0 ? pos[0] - 2.01 : pos[0] + 2.01, 1.2, pos[2]);
                if (pos[0] > 0) doorSmall.rotation.y = -Math.PI / 2;
                else doorSmall.rotation.y = Math.PI / 2;
                group.add(doorSmall);
            });

            group.position.set(0, 0, 0);
            return group;
        }

        const castle = createCastle();
        scene.add(castle);

        // ============================================================
        // 宝箱（鲜明颜色 + 发光）
        // ============================================================
        function createTreasureBox(type, x, z) {
            const group = new THREE.Group();
            let color, name, value, icon, glowColor;

            if (type === TREASURE_TYPES.WOOD) {
                color = 0x8B6B4D; // 棕色
                name = '木头宝箱';
                value = 25;
                icon = '📦';
                glowColor = 0x8B6B4D;
            } else {
                color = 0xFFD700; // 金色
                name = '金色宝箱';
                value = 50;
                icon = '👑';
                glowColor = 0xFFD700;
            }

            const boxMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.4,
                metalness: type === TREASURE_TYPES.GOLD ? 0.8 : 0.1,
                emissive: glowColor,
                emissiveIntensity: 0.15,
            });
            const box = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.8, 1.0), boxMat);
            box.position.y = 0.4;
            box.castShadow = true;
            group.add(box);

            const lidMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.4,
                metalness: type === TREASURE_TYPES.GOLD ? 0.8 : 0.1,
                emissive: glowColor,
                emissiveIntensity: 0.15,
            });
            const lid = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.12, 1.05), lidMat);
            lid.position.y = 0.86;
            lid.rotation.x = 0.1;
            group.add(lid);

            const lockMat = new THREE.MeshStandardMaterial({ color: 0x886644, metalness: 0.8 });
            const lock = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.12, 0.06), lockMat);
            lock.position.set(0, 0.8, 0.5);
            group.add(lock);

            // 强发光光晕
            const glowMat = new THREE.MeshStandardMaterial({
                color: glowColor,
                emissive: glowColor,
                emissiveIntensity: 0.4,
                transparent: true,
                opacity: 0.25,
            });
            const glow = new THREE.Mesh(new THREE.SphereGeometry(1.2, 12, 12), glowMat);
            glow.position.y = 0.4;
            group.add(glow);

            // 顶部光柱
            const pillarMat = new THREE.MeshStandardMaterial({
                color: glowColor,
                emissive: glowColor,
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.15,
            });
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 2.5, 6), pillarMat);
            pillar.position.set(0, 1.8, 0);
            group.add(pillar);

            group.position.set(x, 0, z);
            group.userData = {
                type: type,
                name: name,
                value: value,
                icon: icon,
                opened: false,
                model: group,
            };
            return group;
        }

        // ============================================================
        // 放置宝箱
        // ============================================================
        function placeTreasures() {
            const positions = [
                [-4, 11],
                [4, 11],
                [-4, 14],
                [4, 14],
                [-4, 17],
                [4, 17],
                [-2, 12],
                [2, 12],
                [-6, 10],
                [6, 10],
                [0, 19],
            ];
            const shuffled = positions.sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, 2);

            selected.forEach((pos, index) => {
                const type = index === 0 ? TREASURE_TYPES.WOOD : TREASURE_TYPES.GOLD;
                const treasure = createTreasureBox(type, pos[0], pos[1]);
                scene.add(treasure);
                // 给宝箱添加碰撞
                addObstacle(pos[0], pos[1], 0.8);
                gameState.treasures.push({
                    mesh: treasure,
                    type: type,
                    position: { x: pos[0], z: pos[1] },
                    opened: false,
                    value: type === TREASURE_TYPES.WOOD ? 25 : 50,
                });
            });

            updateTreasureCount();
        }

        // ============================================================
        // 凤凰蛋
        // ============================================================
        function createPhoenixEgg(x, y, z) {
            const group = new THREE.Group();

            const eggMat = new THREE.MeshStandardMaterial({
                color: 0xff6633,
                emissive: 0xff4400,
                emissiveIntensity: 0.5,
                roughness: 0.2,
                metalness: 0.5,
            });
            const egg = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), eggMat);
            egg.scale.set(0.9, 1.2, 0.9);
            egg.position.y = 0.5;
            egg.castShadow = true;
            group.add(egg);

            const lineMat = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                emissive: 0xff8800,
                emissiveIntensity: 0.4,
            });
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const line = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.02, 4, 8), lineMat);
                line.position.set(0, 0.5, 0);
                line.rotation.x = Math.PI / 2;
                line.rotation.z = angle;
                group.add(line);
            }

            const flameMat = new THREE.MeshStandardMaterial({
                color: 0xff4400,
                emissive: 0xff2200,
                emissiveIntensity: 0.8,
                transparent: true,
                opacity: 0.8,
            });
            const flame = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.4, 6), flameMat);
            flame.position.y = 1.0;
            group.add(flame);

            const glowMat = new THREE.MeshStandardMaterial({
                color: 0xff4400,
                emissive: 0xff4400,
                emissiveIntensity: 0.4,
                transparent: true,
                opacity: 0.15,
            });
            const glow = new THREE.Mesh(new THREE.SphereGeometry(0.7, 8, 8), glowMat);
            glow.position.y = 0.5;
            group.add(glow);

            group.position.set(x, y, z);
            return group;
        }

        // ============================================================
        // 王权之心
        // ============================================================
        function createCrownHeart(x, y, z) {
            const group = new THREE.Group();

            const heartMat = new THREE.MeshStandardMaterial({
                color: 0xff0044,
                emissive: 0xcc0033,
                emissiveIntensity: 0.5,
                roughness: 0.2,
                metalness: 0.8,
            });
            const heart = new THREE.Mesh(new THREE.SphereGeometry(0.45, 12, 12), heartMat);
            heart.scale.set(1, 1.2, 0.8);
            heart.position.y = 0.4;
            heart.castShadow = true;
            group.add(heart);

            const heart2 = new THREE.Mesh(new THREE.SphereGeometry(0.45, 12, 12), heartMat);
            heart2.scale.set(1, 1.2, 0.8);
            heart2.position.set(0.3, 0.6, 0);
            group.add(heart2);

            const heart3 = new THREE.Mesh(new THREE.SphereGeometry(0.45, 12, 12), heartMat);
            heart3.scale.set(1, 1.2, 0.8);
            heart3.position.set(-0.3, 0.6, 0);
            group.add(heart3);

            const crownMat = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                emissive: 0xff8800,
                emissiveIntensity: 0.3,
                metalness: 0.9,
                roughness: 0.2,
            });
            const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 0.2, 8), crownMat);
            crown.position.y = 1.0;
            group.add(crown);

            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const spike = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.2, 4), crownMat);
                spike.position.set(Math.cos(angle) * 0.52, 1.15, Math.sin(angle) * 0.52);
                spike.rotation.z = Math.cos(angle) * 0.3;
                spike.rotation.x = Math.sin(angle) * 0.3;
                group.add(spike);

            const gemMat = new THREE.MeshStandardMaterial({

                emissive: 0xff0044,

                transparent: true,

            });
            const gem = new THREE.Mesh(new THREE.OctahedronGeometry(0.1), gemMat);
            gem.position.set(0, 1.05, 0.35);
            group.add(gem);

            const glowMat = new THREE.MeshStandardMaterial({
                color: 0xff0044,
                emissive: 0xff0044,
                emissiveIntensity: 0.4,
                transparent: true,
                opacity: 0.15,
            });
            const glow = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), glowMat);
            glow.position.y = 0.5;
            group.add(glow);

        // ============================================================
        // 玩家
        // ============================================================
        function createPlayer() {
            const group = new THREE.Group();

            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xFFD54F, roughness: 0.3 });
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.6, 12, 12), bodyMat);
            body.scale.set(1, 0.85, 1);
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);

            const bellyMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.5 });
            const belly = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), bellyMat);
            belly.scale.set(0.9, 0.8, 0.5);
            belly.position.set(0, 0.5, 0.6);
            group.add(belly);

            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e });
            const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF });
            for (let s = -1; s <= 1; s += 2) {
                const white = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 6), eyeWhiteMat);
                white.position.set(s * 0.25, 0.8, 0.65);
                group.add(white);
                const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), eyeMat);
                pupil.position.set(s * 0.25 + s * 0.06, 0.8, 0.75);
                group.add(pupil);
            }

            const hatMat = new THREE.MeshStandardMaterial({ color: 0x8B5CF6, roughness: 0.3 });
            const hat = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.5, 6), hatMat);
            hat.position.y = 1.05;
            group.add(hat);
            const hatBand = new THREE.Mesh(new THREE.TorusGeometry(0.45, 0.04, 4, 8),
                new THREE.MeshStandardMaterial({ color: 0xEC4899 }));
            hatBand.position.y = 0.9;
            group.add(hatBand);

            group.position.set(0, 0, -12);
            return group;
        }

        const player = createPlayer();
        scene.add(player);
        const PLAYER_RADIUS = 0.5;

        // ============================================================
        // 进入古堡
        // ============================================================
        function enterCastle() {
            if (gameState.isInCastle) return;
            gameState.isInCar = false;
            gameState.isInCastle = true;
            document.getElementById('locationLabel').textContent = '🏰 温斯洛古堡';
            document.getElementById('game-status').textContent = '🔍 探索古堡，寻找宝箱！';
            document.getElementById('enter-btn').classList.add('hidden');
            player.position.set(0, 0, 4);
            document.getElementById('controls-hint').textContent = '🕹️ 探索古堡 · 靠近宝箱跳跃开启';
        }

        // ============================================================
        // 宝箱交互
        // ============================================================
        function checkNearTreasure() {
            const playerPos = player.position;
            let found = false;
            for (let t of gameState.treasures) {
                if (t.opened) continue;
                const dx = playerPos.x - t.position.x;
                const dz = playerPos.z - t.position.z;
                if (dx * dx + dz * dz < 4) {
                    openTreasure(t);
                    found = true;
                    break;
                }
            }
            if (!found && gameState.isInCastle) {
                // 在古堡里按跳跃，但不在宝箱旁，提示
                document.getElementById('game-status').textContent = '🔍 附近没有宝箱，继续探索！';
                setTimeout(() => {
                    document.getElementById('game-status').textContent = '🔍 探索古堡，寻找宝箱！';
                }, 1000);
            }
        }

        function openTreasure(treasure) {
            if (treasure.opened) return;
            treasure.opened = true;
            gameState.treasureCount++;
            updateTreasureCount();

            scene.remove(treasure.mesh);

            const pos = treasure.position;
            let model;
            if (treasure.type === TREASURE_TYPES.WOOD) {
                model = createPhoenixEgg(pos.x, 0.5, pos.z);
                gameState.value += 25;
                document.getElementById('game-status').textContent = '🔥 获得凤凰蛋！价值 25 万！';
            } else {
                model = createCrownHeart(pos.x, 0.5, pos.z);
                gameState.value += 50;
                document.getElementById('game-status').textContent = '👑 获得王权之心！价值 50 万！';
            }
            scene.add(model);

            updateValueDisplay();

            if (gameState.treasureCount >= gameState.maxTreasures) {
                document.getElementById('game-status').textContent = '🎉 所有宝箱已开启！点击"上交全部"撤离！';
                document.getElementById('submit-btn').disabled = false;
            }

            if (navigator.vibrate) navigator.vibrate(50);
        }

        // ============================================================
        // 上交全部
        // ============================================================
        function submitAll() {
            if (gameState.value >= 100) {
                gameState.isWin = true;
                document.getElementById('winValue').textContent = gameState.value;
                document.getElementById('win-overlay').classList.add('active');
                document.getElementById('submit-btn').disabled = true;
                document.getElementById('game-status').textContent = '🚐 成功撤离！';
            } else {
                document.getElementById('game-status').textContent = '💰 当前价值 ' + gameState.value + ' 万，需要 100 万才能撤离！';
                document.getElementById('game-status').style.color = '#ff6b6b';
                setTimeout(() => {
                    document.getElementById('game-status').style.color = '';
                }, 1500);
            }
        }

        // ============================================================
        // UI更新
        // ============================================================
        function updateValueDisplay() {
            document.getElementById('valueDisplay').innerHTML = gameState.value + ' <span>万</span>';
        }

        function updateTreasureCount() {
            document.getElementById('treasureCount').textContent = '宝箱: ' + gameState.treasureCount + '/' + gameState
                .maxTreasures;
        }

        // ============================================================
        // 窗口自适应
        // ============================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================================
        // 相机跟随
        // ============================================================
        const camDistance = 10;
        const camHeight = 7;

        function updateCamera() {
            const playerPos = player.position.clone();
            playerPos.y += 1.5;
            const angle = player.rotation.y || 0;
            const offsetX = Math.sin(angle) * camDistance;
            const offsetZ = Math.cos(angle) * camDistance;
            camera.position.x = playerPos.x - offsetX;
            camera.position.z = playerPos.z - offsetZ;
            camera.position.y = playerPos.y + camHeight;
            camera.lookAt(playerPos);
        }

        // ============================================================
        // 初始化游戏
        // ============================================================
        function initGame() {
            player.position.set(0, 0, -12);
            document.getElementById('locationLabel').textContent = '🚐 摸金车';
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('enter-btn').classList.remove('hidden');
            gameState.isInCar = true;
            gameState.isInCastle = false;

            placeTreasures();

            updateValueDisplay();
            updateTreasureCount();

            document.getElementById('game-status').textContent = '🔍 点击「进入古堡」开始探险！';
        }

        // ============================================================
        // 摇杆控制
        // ============================================================
        const joystickArea = document.getElementById('joystick-area');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickData = { x: 0, y: 0 };
        let joystickTouchId = null;
        const SENSITIVITY = 0.6;

        function handleJoystickStart(clientX, clientY) {
            const rect = joystickArea.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const radius = rect.width / 2;
            let dx = clientX - centerX;
            let dy = clientY - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const maxDist = radius - 30;
            if (dist > maxDist) { dx = dx / dist * maxDist;
                dy = dy / dist * maxDist; }
            joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            joystickKnob.classList.add('active');
            const normalizedX = (dx / maxDist) * SENSITIVITY;
            const normalizedY = (dy / maxDist) * SENSITIVITY;
            joystickData.x = Math.max(-1, Math.min(1, normalizedX));
            joystickData.y = Math.max(-1, Math.min(1, normalizedY));
            joystickActive = true;
        }

        function handleJoystickMove(clientX, clientY) {
            if (!joystickActive) return;
            const rect = joystickArea.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const radius = rect.width / 2;
            let dx = clientX - centerX;
            let dy = clientY - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const maxDist = radius - 30;
            if (dist > maxDist) { dx = dx / dist * maxDist;
                dy = dy / dist * maxDist; }
            joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            const normalizedX = (dx / maxDist) * SENSITIVITY;
            const normalizedY = (dy / maxDist) * SENSITIVITY;
            joystickData.x = Math.max(-1, Math.min(1, normalizedX));
            joystickData.y = Math.max(-1, Math.min(1, normalizedY));
        }

        function handleJoystickEnd() {
            joystickKnob.style.transform = 'translate(-50%, -50%)';
            joystickKnob.classList.remove('active');
            joystickActive = false;
            joystickData.x = 0;
            joystickData.y = 0;
            joystickTouchId = null;
        }

        joystickArea.addEventListener('mousedown', (e) => { e.preventDefault();
            handleJoystickStart(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => { if (joystickActive) handleJoystickMove(e.clientX, e.clientY); });
        window.addEventListener('mouseup', () => { if (joystickActive) handleJoystickEnd(); });
        joystickArea.addEventListener('touchstart', (e) => { e.preventDefault(); const touch = e.changedTouches[0];
            joystickTouchId = touch.identifier;
            handleJoystickStart(touch.clientX, touch.clientY); }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (joystickTouchId !== null) {
                const touch = Array.from(e.changedTouches).find(t => t.identifier === joystickTouchId);
                if (touch) { e.preventDefault();
                    handleJoystickMove(touch.clientX, touch.clientY); }
            }
        }, { passive: false });
        window.addEventListener('touchend', (e) => {
            const touch = Array.from(e.changedTouches).find(t => t.identifier === joystickTouchId);
            if (touch) { e.preventDefault();
                handleJoystickEnd(); }
        }, { passive: false });
        window.addEventListener('touchcancel', () => { if (joystickTouchId !== null) handleJoystickEnd(); });

        // ============================================================
        // 跳跃
        // ============================================================
        const jumpBtn = document.getElementById('jump-btn');
        let velocityY = 0;
        let isOnGround = true;
        let isJumping = false;
        const jumpSpeed = 5.0;

        function doJump() {
            if (isOnGround && !isJumping) {
                velocityY = jumpSpeed;
                isOnGround = false;
                isJumping = true;
                checkNearTreasure();
            }
        }
        jumpBtn.addEventListener('mousedown', (e) => { e.preventDefault();
            doJump(); });
        jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault();
            doJump(); }, { passive: false });

        // ============================================================
        // 动画循环
        // ============================================================
        let time = 0;
        const clock = new THREE.Clock();
        const playerSpeed = 4.5;

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.05);
            time += delta;

            const moveX = joystickData.x;
            const moveZ = joystickData.y;

            const forward = new THREE.Vector3(0, 0, -1);
            const right = new THREE.Vector3(1, 0, 0);
            const camQuat = camera.quaternion.clone();
            camQuat.x = 0;
            camQuat.z = 0;
            camQuat.normalize();

            const moveDir = new THREE.Vector3();
            moveDir.add(forward.clone().applyQuaternion(camQuat).multiplyScalar(-moveZ));
            moveDir.add(right.clone().applyQuaternion(camQuat).multiplyScalar(moveX));
            moveDir.y = 0;

            const moveLen = moveDir.length();
            if (moveLen > 0.01) {
                moveDir.normalize();
                const targetAngle = Math.atan2(moveDir.x, moveDir.z);
                let currentAngle = player.rotation.y;
                let diff = targetAngle - currentAngle;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                const turnSpeed = 5.0;
                player.rotation.y += diff * Math.min(1, turnSpeed * delta);
            }

            const moveSpeed = playerSpeed * Math.min(1, moveLen);
            const step = moveSpeed * delta;
            const moveVec = moveDir.clone().multiplyScalar(step);

            // 碰撞检测移动
            const newX = player.position.x + moveVec.x;
            const newZ = player.position.z + moveVec.z;

            if (!checkCollision(newX, player.position.z, PLAYER_RADIUS)) {
                player.position.x += moveVec.x;
            }
            if (!checkCollision(player.position.x, newZ, PLAYER_RADIUS)) {
                player.position.z += moveVec.z;
            }

            // 跳跃物理
            if (!isOnGround) {
                velocityY -= 12 * delta;
                player.position.y += velocityY * delta;
                if (player.position.y <= 0) {
                    player.position.y = 0;
                    velocityY = 0;
                    isOnGround = true;
                    isJumping = false;
                }
            }

            const breathe = Math.sin(time * 2) * 0.005;
            player.position.y += breathe;

            // 宝箱旋转 + 发光闪烁
            gameState.treasures.forEach(t => {
                if (!t.opened && t.mesh) {
                    t.mesh.rotation.y += delta * 0.8;
                    t.mesh.position.y = 0 + Math.sin(time * 2 + t.position.x) * 0.05;
                    // 发光闪烁
                    t.mesh.children.forEach(child => {
                        if (child.material && child.material.emissiveIntensity !== undefined) {
                            child.material.emissiveIntensity = 0.15 + Math.sin(time * 3 + t.position.x) * 0.1;
                        }
                    });
                }
            });

            // 蜡烛光闪烁
            candleLight.intensity = 1.8 + Math.sin(time * 3) * 0.3;
            candleLight2.intensity = 1.3 + Math.sin(time * 2.5 + 1) * 0.25;
            candleLight3.intensity = 1.3 + Math.sin(time * 2.8 + 2) * 0.25;
            candleLight4.intensity = 1.3 + Math.sin(time * 3.2 + 0.5) * 0.25;

            // 宝物特效
            scene.children.forEach(child => {
                if (child.isMesh && child.material && child.material.emissiveIntensity !== undefined) {
                    if (child.material.color.getHex() === 0xff6633 || child.material.color.getHex() === 0xff0044) {
                        child.material.emissiveIntensity = 0.3 + Math.sin(time * 2 + child.position.x) * 0.2;
                    }
                }
            });

            updateCamera();
            renderer.render(scene, camera);
        }

        updateCamera();
        animate();

        console.log('🕯️ 惊魂寻宝队已加载！');
